# ----------------------------------------------------------------------------
# Postgres credentials, stored as a Kubernetes Secret instead of plaintext
# env vars in the Deployment spec.
#
# IMPORTANT: This file is a TEMPLATE. Never commit real credentials to git.
# Add k8s/secret.yaml to .gitignore and create the real secret one of two ways:
#
#   Option A (recommended for a lab) - imperative create, nothing touches disk:
#     kubectl create secret generic postgres-credentials \
#       --from-literal=POSTGRES_USER=opennms \
#       --from-literal=POSTGRES_PASSWORD=<your-password> \
#       --from-literal=POSTGRES_DB=opennms
#
#   Option B - fill in stringData below locally, apply it, then do NOT commit it.
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
type: Opaque
stringData:
  POSTGRES_USER: opennms
  POSTGRES_PASSWORD: REPLACE_ME
  POSTGRES_DB: opennms
